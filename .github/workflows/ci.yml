name: ci

# Runs on every PR and push to main. Validates schemas, runs drift tests,
# and renders sample artifacts to confirm the renderers stay green.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Validate capability schemas + build index
        run: python -m renderers.shared.capability_loader

      - name: Run all tests
        run: pytest -v

      - name: Render Rev 5 Word SSP (fixture-backed)
        run: |
          mkdir -p samples
          python -m renderers.rev5_ssp \
            --out samples/rev5_ssp.docx \
            --fixtures tests/fixtures

      - name: Render Rev 5 machine-readable JSON (fixture-backed)
        run: |
          python -m renderers.rev5_machine_readable \
            --out samples/rev5.json \
            --fixtures tests/fixtures \
            --impact Moderate

      - name: Render Rev 5 machine-readable YAML (fixture-backed)
        run: |
          python -m renderers.rev5_machine_readable \
            --out samples/rev5.yaml \
            --fixtures tests/fixtures \
            --impact Moderate

      - name: Render Rev 5 OSCAL SSP (fixture-backed)
        run: |
          python -m renderers.oscal_ssp \
            --out samples/rev5_oscal.json \
            --fixtures tests/fixtures \
            --impact Moderate

      - name: Render 20x FRMR package (fixture-backed)
        run: |
          python -m renderers.fedramp_20x \
            --out samples/20x.json \
            --fixtures tests/fixtures

      - name: Upload sample artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rendered-samples
          path: samples/
          retention-days: 7
