name: rfc-watcher

# Weekly scan of fedramp.gov/rfcs/ — open RFCs are 30–90 days ahead of
# changes. This opens issues against capabilities that may be affected,
# tagged with the RFC number, so we have lead time rather than reacting
# after a release ships.

on:
  schedule:
    - cron: '0 7 * * 1'    # Mondays 07:00 UTC
  workflow_dispatch: {}

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install -r requirements.txt

      - name: Scan open RFCs
        run: python sync/rfc_watcher.py --emit-issues

      # Example: RFC-0031 on ICP would automatically open issues against
      # every capability that satisfies KSI-AFR-10 or any IR-* control.
