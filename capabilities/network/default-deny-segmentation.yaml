id: cap-default-deny-segmentation
title: Default-deny network segmentation with explicit allow-list

capability_statement: |
  All network communication into and within the system is governed by
  a default-deny posture enforced at the cloud provider's stateful
  firewall layer (AWS Security Groups + NACLs, GCP VPC firewall rules,
  Azure NSGs). No ingress or egress rule is permitted unless it
  specifies a CIDR or service identifier, a port range, and a
  documented business justification recorded in the rule's tags.

  Public ingress is terminated only at a small set of dedicated
  edge resources (CDN, WAF, public load balancers); all other
  components have no public IP and are reachable only from inside the
  VPC or via PrivateLink-style service endpoints. East-west traffic
  between application tiers is governed by service-mesh policies
  (Istio AuthorizationPolicy, Linkerd Server policies, or equivalent)
  that mirror the IP-layer rules.

  Drift is detected nightly by an automated diff between the running
  cloud configuration and the Terraform state.

applies_when:
  impact_levels: [Low, Moderate, High]
  cloud_providers: [multi]

satisfies:
  fedramp_20x:
    - ksi: KSI-CNA-01
      coverage: full
      notes: "Default-deny posture at every cloud-native firewall layer."
    - ksi: KSI-CNA-02
      coverage: full
      notes: "Explicit boundary enforcement; no incidental public exposure."
    - ksi: KSI-CNA-04
      coverage: partial
      notes: "Service-mesh layer covers application-tier segmentation."

  fedramp_rev5:
    - control: SC-7
      coverage: full
      implementation_status: Implemented
    - control: SC-7(3)
      coverage: full
      implementation_status: Implemented
    - control: SC-7(4)
      coverage: full
      implementation_status: Implemented
    - control: SC-7(5)
      coverage: full
      implementation_status: Implemented
    - control: SC-7(8)
      coverage: full
      implementation_status: Implemented
    - control: AC-4
      coverage: full
      implementation_status: Implemented
    - control: AC-4(21)
      coverage: full
      implementation_status: Implemented

  soc2:
    - criterion: CC6.6

  nist_csf_2:
    - subcategory: PR.AA-05
    - subcategory: PR.IR-01

evidence:
  - id: ev-aws-sg-default-deny
    type: api_export
    source: aws
    collector: evidence/aws/security_groups_audit.sh
    schedule: daily
    validation_method: automated
    validation_rule: |
      [.security_groups[]
        | select(.IpPermissions[]
            | .IpRanges[]
            | .CidrIp == "0.0.0.0/0"
            | not_ssh_or_internal
          )] | length == 0

  - id: ev-aws-public-resources-inventory
    type: api_export
    source: aws
    collector: evidence/aws/public_resources_audit.sh
    schedule: daily
    validation_method: automated

  - id: ev-gcp-firewall-rules
    type: api_export
    source: gcp
    collector: evidence/gcp/firewall_rules_audit.sh
    schedule: daily
    validation_method: automated

  - id: ev-network-drift-diff
    type: terraform_plan
    source: common
    collector: evidence/common/terraform_drift_diff.sh
    schedule: daily
    validation_method: automated

terraform_modules:
  - cloud: aws
    path: terraform/aws/modules/vpc-default-deny
  - cloud: gcp
    path: terraform/gcp/modules/vpc-default-deny
  - cloud: azure
    path: terraform/azure/modules/vnet-default-deny

policy_rules:
  - policies/network/default-deny.rego

provenance:
  frmr_version: v0.9.0-beta
  last_reviewed: 2026-06-01
  reviewers:
    - "@grc-eng-toolkit-maintainers"
