id: cap-mfa-phishing-resistant
title: Phishing-resistant MFA for all human users

# This capability is aggregator-backed. The aggregator pulls live state
# from Okta and AWS IAM, applies deterministic rules per control, and
# emits the implementation narrative + status at render time.
#
# Authoritative coverage is declared by the aggregator
# (aggregators.mfa.MfaAggregator.SUPPORTED_*). This satisfies block
# is verified to be a subset of that at load time.
aggregator: aggregators.mfa

applies_when:
  impact_levels: [Low, Moderate, High]
  cloud_providers: [aws, multi]

satisfies:
  fedramp_20x:
    - { ksi: KSI-IAM-01, coverage: full }
    - { ksi: KSI-IAM-02, coverage: full }

  fedramp_rev5:
    - { control: IA-2, coverage: full }
    - { control: IA-2(1), coverage: full }
    - { control: IA-2(2), coverage: full }
    - { control: IA-2(8), coverage: full }
    - { control: IA-5(1), coverage: partial }

  soc2:
    - { criterion: CC6.1 }
    - { criterion: CC6.6 }

  nist_csf_2:
    - { subcategory: PR.AA-01 }
    - { subcategory: PR.AA-03 }

terraform_modules:
  - { cloud: aws,   path: terraform/aws/modules/okta-mfa-enforcement }
  - { cloud: azure, path: terraform/azure/modules/entra-conditional-access-mfa }
  - { cloud: gcp,   path: terraform/gcp/modules/identity-platform-mfa }

policy_rules:
  - policies/iam/mfa-phishing-resistant.rego

provenance:
  frmr_version: v0.9.0-beta
  validated_in_assessment:
    - csp: Paramify
      assessor_3pao: Coalfire
      date: 2025-07-10
      url: https://github.com/paramify/fedramp-20x-pilot
  last_reviewed: 2026-06-01
  reviewers:
    - "@grc-eng-toolkit-maintainers"
